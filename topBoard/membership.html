<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 페이지에용</title>

    <link rel="stylesheet" href="../css/membership.css">
</head>
<body>
    <div class="big_box">
        <a id="go_home" href="../Mi01.html"></a>
        <h1 class="title_name">회원가입</h1>
            <form action="./membership.php" method="post">
                <div class="small_box_01">
                    <p>아이디</p>
                    <input id="user_id" type="text" name="id" required placeholder="아이디">
                    <button type="button">중복확인</button>
                    <p>비밀번호</p>
                    <input id="pw" type="password" name="pw" required placeholder="비밀번호">
                    <p>비밀번호 재확인</p>
                    <input id="pw_check" type="password" name="pw_check" required placeholder="비밀번호 재확인">
                    <!-- <p>이메일 [선택]</p>
                    <input id="email" type="email" name="email" placeholder="이메일 입력"> -->
                </div>
                <div class="small_box_02">
                    <input id="name" type="text" required name="name" placeholder="이름">
                    <input id="day" type="date" required name="birthday">
                    <label><input type="radio" name="gender" value="m">남자</label>
                    <label><input type="radio" name="gender" value="f">여자</label>
                    <label><input type="radio" name="gender" value="n">선택안함</label>
                </div>
                <div class="country_box">
                    <label for="country" id="country_p">국가 선택</label>

                        <select name="country" required id="country">
                            <option value="">선택하세요</option>
                            <option value="kr">대한민국</option>
                            <option value="en">미국</option>
                            <option value="jp">일본</option>
                            <option value="cn">중국</option>
                            <option value="etc">기타</option>
                        </select>
                    <input type="text" name="phone" placeholder="휴대전화번호">
                </div>
                <button type="button">인증요청</button>
                <button type="submit">가입하기</button>
            </form>

        </div>
    </div>
</body>
</html>
